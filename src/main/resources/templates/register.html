<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Citizen Registration Portal</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">Citizen Grievance Portal</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted text-center">Register or log in using your phone number to submit a complaint directly to your MLA.</p>
                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Mobile Number (Spam Prevention)</label>
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="e.g. 9876543210" required>
                        </div>
                        <div class="mb-3">
                            <label for="region" class="form-label">Region / Constituency Ward</label>
                            <input type="text" class="form-control" id="region" name="region" placeholder="Enter your neighborhood or ward number" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Request Verification Code</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

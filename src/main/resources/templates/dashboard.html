<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Citizen Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">MLA Grievance Management Dashboard</span>
        <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">Sign Out</a>
    </div>
</nav>

<div class="container">
    <div class="row">
        <!-- Left Side: Submit New Complaint Form -->
        <div class="col-lg-4 mb-4">
            <div class="card shadow-sm border-0 position-sticky" style="top: 20px;">
                <div class="card-body p-4">
                    <h5 class="card-title fw-bold">Citizen Details</h5>
                    <p class="mb-1 text-secondary"><strong>Name:</strong> <span th:text="${user.name}"></span></p>
                    <p class="mb-1 text-secondary"><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
                    <p class="mb-3 text-secondary"><strong>Region:</strong> <span th:text="${user.region}"></span></p>
                    <hr>
                    <h5 class="card-title fw-bold mt-3">File a New Grievance</h5>
                    <form th:action="@{/complaint}" method="post" class="mt-3">
                        <div class="mb-3">
                            <label for="message" class="form-label text-muted">Describe your issue in detail</label>
                            <textarea class="form-control" id="message" name="message" rows="5" placeholder="Provide description here..." required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Submit File Entry</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Right Side: Existing Complaints History -->
        <div class="col-lg-8">
            <h4 class="fw-bold mb-3 text-dark">Your Filed Grievances</h4>

            <div th:if="${#lists.isEmpty(complaints)}" class="alert alert-info text-center py-4 border-0 shadow-sm shadow-sm">
                No history found. File your first complaint on the left panel.
            </div>

            <div th:each="comp : ${complaints}" class="card shadow-sm border-0 mb-3">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge bg-warning text-dark text-uppercase font-monospace px-2 py-1" th:text="${comp.status}"></span>
                        <small class="text-muted" th:text="${#temporals.format(comp.createdAt, 'dd-MMM-yyyy hh:mm a')}"></small>
                    </div>
                    <p class="card-text text-dark bg-light p-3 rounded" style="white-space: pre-wrap;" th:text="${comp.message}"></p>

                    <div class="d-flex justify-content-end mt-3">
                        <!-- Redirection anchor targeting the specific WhatsApp route inside PortalController -->
                        <a th:href="@{/share/whatsapp/{id}(id=${comp.id})}" target="_blank" class="btn btn-success d-inline-flex align-items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-whatsapp" viewBox="0 0 16 16">
                                <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79 1.01h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.69-4.294c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
                            </svg>
                            Directly Message MLA on WhatsApp
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

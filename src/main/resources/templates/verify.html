<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Verify Mobile Number</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header bg-dark text-white text-center py-3">
          <h5 class="mb-0">Security Verification</h5>
        </div>
        <div class="card-body p-4 text-center">
          <p class="text-muted">A verification code has been simulated for safety. Check your IntelliJ IDEA console logs to retrieve the 4-digit code.</p>

          <!-- Alert Message for Invalid OTP input -->
          <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>

          <form th:action="@{/verify}" method="post" class="mt-4">
            <div class="mb-3">
              <input type="text" class="form-control form-control-lg text-center letter-spacing-2"
                     id="otp" name="otp" placeholder="Enter 4-Digit Code" maxlength="4" autocomplete="off" required>
            </div>
            <div class="d-grid mt-3">
              <button type="submit" class="btn btn-success btn-lg">Verify & Proceed</button>
            </div>
          </form>
          <div class="mt-3">
            <a th:href="@{/register}" class="text-decoration-none small text-secondary">← Back to registration</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
